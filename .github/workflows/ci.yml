name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspaces --if-present
      - run: npm run check-types --workspaces --if-present

  test-ts-services:
    name: Test TS Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, shift-service, plan-service, meal-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --workspace=${{ matrix.service }} --if-present

  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [circadian-engine, ai-pipeline]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
      - name: Run tests
        env:
          ANTHROPIC_API_KEY: mock-key
          OPENAI_API_KEY: mock-key
          REDIS_URL: redis://localhost:6379
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspaces --if-present
