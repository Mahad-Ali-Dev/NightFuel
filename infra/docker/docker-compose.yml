version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - shift-service
      - circadian-engine
      - ai-pipeline
      - plan-service
      - meal-service
      - progress-service
      - exercise-service
      - sleep-service
      - notification-service
      - subscription-service
    restart: unless-stopped

  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_auth?schema=public
      DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_auth?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  shift-service:
    build:
      context: ../../
      dockerfile: services/shift-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_shifts?schema=public
      DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_shifts?schema=public
      REDIS_URL: redis://redis:6379
      SHIFT_PORT: 3002
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  circadian-engine:
    build:
      context: ../../services/circadian-engine
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3003
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-pipeline:
    build:
      context: ../../services/ai-pipeline
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3004
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-mock-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-mock-key}
    depends_on:
      redis:
        condition: service_healthy
      circadian-engine:
        condition: service_started
    restart: unless-stopped

  plan-service:
    build:
      context: ../../
      dockerfile: services/plan-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      PLAN_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_plans?schema=public
      PLAN_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_plans?schema=public
      REDIS_URL: redis://redis:6379
      PLAN_PORT: 3005
      AI_PIPELINE_URL: http://ai-pipeline:3004
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-pipeline:
        condition: service_started
    restart: unless-stopped

  meal-service:
    build:
      context: ../../
      dockerfile: services/meal-service/Dockerfile
    ports:
      - "3006:3006"
    environment:
      MEAL_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_meals?schema=public
      MEAL_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_meals?schema=public
      REDIS_URL: redis://redis:6379
      MEAL_PORT: 3006
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ../../
      dockerfile: services/user-service/Dockerfile
    ports:
      - "3009:3009"
    environment:
      USER_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_users?schema=public
      USER_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_users?schema=public
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_users?schema=public
      REDIS_URL: redis://redis:6379
      USER_PORT: 3009
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  progress-service:
    build:
      context: ../../
      dockerfile: services/progress-service/Dockerfile
    ports:
      - "3007:3007"
    environment:
      PROGRESS_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_progress?schema=public
      PROGRESS_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_progress?schema=public
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_progress?schema=public
      REDIS_URL: redis://redis:6379
      PROGRESS_PORT: 3007
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ../../
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "3008:3008"
    environment:
      NOTIF_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_notifications?schema=public
      NOTIF_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_notifications?schema=public
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_notifications?schema=public
      REDIS_URL: redis://redis:6379
      NOTIF_PORT: 3008
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-VAPID_PLACEHOLDER_PUBLIC}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-VAPID_PLACEHOLDER_PRIVATE}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@nightfuel.app}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  exercise-service:
    build:
      context: ../../
      dockerfile: services/exercise-service/Dockerfile
    ports:
      - "3011:3011"
    environment:
      EXERCISE_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_exercise?schema=public
      EXERCISE_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_exercise?schema=public
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_exercise?schema=public
      REDIS_URL: redis://redis:6379
      EXERCISE_PORT: 3011
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  sleep-service:
    build:
      context: ../../
      dockerfile: services/sleep-service/Dockerfile
    ports:
      - "3010:3010"
    environment:
      SLEEP_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_sleep?schema=public
      SLEEP_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_sleep?schema=public
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_sleep?schema=public
      REDIS_URL: redis://redis:6379
      SLEEP_PORT: 3010
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  subscription-service:
    build:
      context: ../../
      dockerfile: services/subscription-service/Dockerfile
    ports:
      - "3012:3012"
    environment:
      SUB_DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_subscriptions?schema=public
      SUB_DIRECT_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_subscriptions?schema=public
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/nightfuel_subscriptions?schema=public
      REDIS_URL: redis://redis:6379
      SUB_PORT: 3012
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Web Client (Next.js 15) ────────────────────────────────────────────────
  web:
    build:
      context: ../../clients/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://nginx/api
      NEXT_PUBLIC_WS_URL: ws://nginx
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-VAPID_PLACEHOLDER_PUBLIC}
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data:
